# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Runs on tag push, validates and promotes draft release
name: 'Release on Tag Push 🚀'

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

permissions: {}

jobs:
  validate_tag:
    name: 'Validate Tag'
    # Skip tag deletion events
    if: "!github.event.deleted"
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      tag: "${{ steps.tag_validate.outputs.tag_name }}"
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: 'Verify pushed tag'
        id: tag_validate
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@461d187a53b5de27b068c2cea5af972c085a4a6a  # v1.0.2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'  # Cannot verify GPG without key

  promote_release:
    name: 'Promote Draft Release'
    needs: validate_tag
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: 'Promote draft release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@072990900b99030363d81d4131c2bf2855f07df0  # v0.1.4
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.validate_tag.outputs.tag }}"
          latest: true
