# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: 'Test local GitHub Action'
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: read
    timeout-minutes: 3
    steps:
      # Load the egress allow-list out-of-band from the
      # organisation's .github repository and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: '@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Checkout repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Perform setup prior to running test(s)
      - name: 'Checkout sample project repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: 'lfreleng-actions/test-python-project'
          path: 'test-python-project'
          persist-credentials: false

      - name: 'Setup static version fixture for testing'
        shell: bash
        run: |
          # Setup static version fixture for testing
          # test-python-project now uses dynamic versioning;
          # copy static variation for tag verification tests
          cp test-python-project/variations/static-eol.toml \
            test-python-project/pyproject.toml

      # Test valid tag comparison
      - name: "Run Action: ${{ github.repository }} [Exact match]"
        uses: ./
        with:
          path_prefix: 'test-python-project/'
          exit_on_fail: 'false'
          test_tag: '0.0.1'

      # Test valid tag comparison (variation)
      - name: "Run Action: ${{ github.repository }} [Strip prefix]"
        uses: ./
        with:
          path_prefix: 'test-python-project/'
          exit_on_fail: 'false'
          test_tag: 'v0.0.1'

      # Test invalid tag comparison
      - name: "Run Action: ${{ github.repository }} [Failure test]"
        uses: ./
        id: failure
        continue-on-error: true
        with:
          path_prefix: 'test-python-project/'
          exit_on_fail: 'true'
          test_tag: '0.1.0'

      # Failure testing is also important
      - name: 'Error if step above did NOT fail'
        if: steps.failure.outcome == 'success'
        shell: bash
        run: |
          # Error if step above did NOT fail
          echo 'Error: previous test step did NOT fail ❌'
          exit 1
